version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: nitinventory-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nitinventory
      POSTGRES_PASSWORD: nitinventory_secret
      POSTGRES_DB: nitinventory
    ports:
      - "5432:5432"
    volumes:
      - nitinventory_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nitinventory"]
      interval: 5s
      timeout: 5s
      retries: 10

  nitinventory-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nitinventory-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://nitinventory:nitinventory_secret@db:5432/nitinventory
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/app:/app/app
      - ./backend/seed.py:/app/seed.py
    command: >
      bash -c "python seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  nitinventory-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nitinventory-frontend
    restart: unless-stopped
    depends_on:
      - nitinventory-backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  nitinventory_pgdata:
